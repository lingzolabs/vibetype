name: Build & Package

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Ubuntu (x86_64): .deb + .rpm + .tar.gz ───────────────────────
  build-ubuntu:
    name: "Ubuntu x86_64"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake \
            g++ \
            git \
            libfcitx5core-dev \
            ninja-build \
            python3 \
            python3-gi \
            dpkg-dev \
            rpm

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -Wno-dev

      - name: Build backend
        run: cmake --build build --target vibetype-backend -j"$(nproc)"

      - name: Check Python syntax
        run: |
          python3 -m py_compile frontend/common/vibetype_client.py
          python3 -m py_compile frontend/cli/vibetype_cli.py
          python3 -m py_compile frontend/ibus/vibetype_ibus.py
          python3 -m py_compile frontend/fcitx5/vibetype_fcitx5_helper.py

      - name: Build packages (.deb + .rpm + .tar.gz)
        run: cmake --build build --target package -j"$(nproc)"

      - name: List built packages
        run: |
          echo "=== Built artifacts ==="
          find build -maxdepth 1 \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' \) -ls

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: build/*.deb
          if-no-files-found: error

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: build/*.rpm
          if-no-files-found: error

      - name: Upload .tar.gz packages
        uses: actions/upload-artifact@v4
        with:
          name: targz-${{ matrix.arch }}
          path: build/*.tar.gz
          if-no-files-found: error

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: vibetype-backend-${{ matrix.arch }}
          path: build/bin/vibetype-backend
          if-no-files-found: error

  # ─── Ubuntu (aarch64 / ARM64) cross-build ─────────────────────────
  build-ubuntu-arm64:
    name: "Ubuntu ARM64"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake \
            g++ \
            git \
            libfcitx5core-dev \
            ninja-build \
            python3 \
            dpkg-dev \
            rpm

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -Wno-dev

      - name: Build backend
        run: cmake --build build --target vibetype-backend -j"$(nproc)"

      - name: Build packages
        run: cmake --build build --target package -j"$(nproc)"

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: deb-aarch64
          path: build/*.deb
          if-no-files-found: error

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v4
        with:
          name: rpm-aarch64
          path: build/*.rpm
          if-no-files-found: error

      - name: Upload .tar.gz packages
        uses: actions/upload-artifact@v4
        with:
          name: targz-aarch64
          path: build/*.tar.gz
          if-no-files-found: error

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: vibetype-backend-aarch64
          path: build/bin/vibetype-backend
          if-no-files-found: error

  # ─── Create GitHub Release (on tag push) ──────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-ubuntu
      - build-ubuntu-arm64
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "Vibetype $TAG" \
            --notes "See [README](https://github.com/${{ github.repository }}) for install instructions." \
            --verify-tag \
            artifacts/**/*
